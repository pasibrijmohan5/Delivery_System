{% extends "base.html" %}

{% block title %}Login | LocalBite - Order Fresh Local Food{% endblock %}

{% block content %}

<style>
    :root {
        --primary: #ff6b35;
        /* appetizing orange */
        --primary-dark: #e55a2a;
        --accent: #ffb259;
        --text-dark: #1f2937;
        --text-light: #6b7280;
        --bg-gradient: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%);
    }

    .login-hero {
        min-height: 100vh;
        background: var(--bg-gradient);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        overflow: hidden;
    }

    .login-hero::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 70% 80%, rgba(255, 255, 255, 0.16) 0%, transparent 65%);
        pointer-events: none;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.93);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border-radius: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.14),
            0 8px 32px rgba(255, 107, 53, 0.11);
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 460px;
        border: 1px solid rgba(255, 255, 255, 0.45);
        position: relative;
        animation: floatIn 1s ease-out;
    }

    @keyframes floatIn {
        from {
            opacity: 0;
            transform: translateY(40px) scale(0.97);
        }

        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .logo-title {
        text-align: center;
        font-size: 2.4rem;
        font-weight: 800;
        color: var(--primary);
        margin-bottom: 0.3rem;
        letter-spacing: -0.03em;
    }

    .subtitle {
        text-align: center;
        color: var(--text-light);
        font-size: 1.05rem;
        margin-bottom: 2.2rem;
    }

    .floating-label-group {
        position: relative;
        margin-bottom: 1.8rem;
    }

    .floating-label-group input {
        width: 100%;
        padding: 1.15rem 1rem 0.65rem;
        border: 1.5px solid #d1d5db;
        border-radius: 12px;
        font-size: 1rem;
        background: rgba(255, 255, 255, 0.75);
        transition: all 0.25s ease;
        outline: none;
    }

    .floating-label-group input:focus,
    .floating-label-group input:not(:placeholder-shown) {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.13);
    }

    .floating-label-group label {
        position: absolute;
        left: 1rem;
        top: 1.1rem;
        color: var(--text-light);
        font-size: 1rem;
        pointer-events: none;
        transition: all 0.25s ease;
    }

    .floating-label-group input:focus+label,
    .floating-label-group input:not(:placeholder-shown)+label {
        top: 0.4rem;
        font-size: 0.83rem;
        color: var(--primary);
        font-weight: 600;
    }

    .btn-login {
        background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
        color: white;
        font-weight: 700;
        padding: 1rem;
        border-radius: 12px;
        border: none;
        width: 100%;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 6px 20px rgba(255, 107, 53, 0.32);
    }

    .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(255, 107, 53, 0.42);
        background: linear-gradient(90deg, var(--primary-dark) 0%, #ff9933 100%);
    }

    .forgot-password {
        text-align: right;
        margin-bottom: 1.6rem;
        font-size: 0.95rem;
    }

    .forgot-password a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
        transition: color 0.2s;
    }

    .forgot-password a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
    }

    .signup-link {
        text-align: center;
        margin-top: 1.9rem;
        font-size: 0.98rem;
        color: var(--text-light);
    }

    .signup-link a {
        color: var(--primary);
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
    }

    .signup-link a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
    }

    @media (max-width: 480px) {
        .login-card {
            padding: 2rem 1.5rem;
        }

        .logo-title {
            font-size: 2.1rem;
        }
    }
</style>

<section class="login-hero">
    <div class="login-card">
        <h1 class="logo-title">LocalBite</h1>
        <p class="subtitle">Welcome back! Let's get you your favorite food</p>

        <form method="POST">
            {% csrf_token %}

            <div class="floating-label-group">
                <input type="text" name="username" placeholder=" " required>
                <label>Username or Email</label>
            </div>

            <div class="floating-label-group">
                <input type="password" name="password" placeholder=" " required>
                <label>Password</label>
            </div>

            <div class="forgot-password">
                <a href="">Forgot password?</a>
            </div>

            <button type="submit" class="btn-login">
                Sign In
            </button>
        </form>

        <div class="signup-link">
            Don't have an account yet? <a href="{% url 'accounts:register' %}">Create one now</a>
        </div>
    </div>
</section>

{% endblock %}
