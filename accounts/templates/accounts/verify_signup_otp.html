{% extends "base.html" %}
{% block title %}Verify OTP{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-16 px-4">
    <div class="bg-white shadow rounded-2xl p-8">
        <h1 class="text-2xl font-bold mb-2">Verify OTP</h1>
        <p class="text-gray-600 mb-6">Enter the 6-digit code sent to your email.</p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <input
                type="text"
                name="otp"
                maxlength="6"
                placeholder="Enter OTP"
                class="w-full border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-green-400"
                required
            >
            <button type="submit" class="w-full bg-black text-white rounded-xl py-3 font-semibold">
                Verify OTP
            </button>
        </form>

        <div class="mt-4 text-center">
            <a href="{% url 'accounts:resend_signup_otp' %}" class="text-green-600 font-medium">
                Resend OTP
            </a>
        </div>
    </div>
</div>
{% endblock %}
